<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractal Tree</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0f; 
      display: flex; 
      flex-direction: column;
      justify-content: center; 
      align-items: center; 
      min-height: 100vh;
      overflow: hidden;
    }
    select {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      font-size: 16px;
      background: #1a1a2e;
      color: #fff;
      border: 2px solid #4ade80;
      border-radius: 8px;
      cursor: pointer;
      z-index: 100;
    }
    select:hover { background: #16213e; }
    canvas { display: block; }
  </style>
</head>
<body>
  <select id="versionSelect" onchange="switchVersion()">
    <option value="minimax">🤖 Minimax (Brown → Green + Wind)</option>
    <option value="chatgpt">💬 ChatGPT (Classic)</option>
  </select>
  
  <div id="canvasContainer"></div>

<script>
let version = 'minimax';
let maxDepth = 10;
let branchAngle;
let windOffset = 0;

function setup() {
  let canvas = createCanvas(windowWidth, windowHeight);
  canvas.parent('canvasContainer');
  angleMode(RADIANS);
  strokeCap(ROUND);
}

function draw() {
  if (version === 'minimax') {
    drawMinimax();
  } else {
    drawChatGPT();
  }
}

function drawMinimax() {
  background(10, 10, 15);
  
  branchAngle = sin(millis() * 0.001) * 0.3 + 0.4;
  windOffset = sin(millis() * 0.0005) * 0.05;
  
  translate(width / 2, height);
  let trunkLen = height * 0.22;
  drawBranchMinimax(trunkLen, 0);
}

function drawBranchMinimax(len, depth) {
  if (depth > maxDepth || len < 4) return;
  
  let brown = color(139, 90, 43);
  let green = color(34, 139, 34);
  let t = depth / maxDepth;
  let col = lerpColor(brown, green, t);
  
  let thickness = map(depth, 0, maxDepth, 12, 1);
  strokeWeight(thickness);
  stroke(col);
  
  line(0, 0, 0, -len);
  translate(0, -len);
  
  let angle = branchAngle + windOffset * (depth / maxDepth);
  
  push();
  rotate(angle);
  drawBranchMinimax(len * 0.67, depth + 1);
  pop();
  
  push();
  rotate(-angle);
  drawBranchMinimax(len * 0.67, depth + 1);
  pop();
  
  if (depth < 6 && depth % 2 === 0) {
    push();
    rotate(windOffset * 0.5);
    drawBranchMinimax(len * 0.5, depth + 1);
    pop();
  }
  
  translate(0, len);
}

function drawChatGPT() {
  background(245, 248, 250);
  
  translate(width / 2, height);
  
  let animatedAngle = PI / 6 + sin(millis() * 0.0015) * 0.25;
  branchChatGPT(120, 10, 0, animatedAngle);
}

function branchChatGPT(len, thickness, depth, angle) {
  if (depth > 9 || len < 8) return;
  
  let t = map(depth, 0, 9, 0, 1);
  let r = lerp(100, 40, t);
  let g = lerp(60, 140, t);
  let b = lerp(20, 60, t);
  
  stroke(r, g, b);
  strokeWeight(thickness);
  line(0, 0, 0, -len);
  
  translate(0, -len);
  
  push();
  rotate(angle);
  branchChatGPT(len * 0.72, thickness * 0.72, depth + 1, angle);
  pop();
  
  push();
  rotate(-angle);
  branchChatGPT(len * 0.72, thickness * 0.72, depth + 1, angle);
  pop();
}

function switchVersion() {
  version = document.getElementById('versionSelect').value;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
