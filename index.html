<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractal Gallery</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0f; 
      display: flex; 
      flex-direction: column;
      justify-content: center; 
      align-items: center; 
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }
    .nav {
      position: absolute;
      top: 20px;
      display: flex;
      gap: 8px;
      z-index: 100;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 95vw;
    }
    .nav button {
      padding: 14px 20px;
      font-size: 16px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s;
      min-width: 80px;
    }
    .nav button:hover { background: rgba(255,255,255,0.2); }
    .nav button.active { background: #4ade80; color: #000; border-color: #4ade80; }
    .nav-arrows {
      position: absolute;
      bottom: 30px;
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 100;
    }
    .arrow-btn {
      padding: 12px 24px;
      font-size: 16px;
      background: rgba(74, 222, 128, 0.3);
      color: #fff;
      border: 2px solid #4ade80;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .arrow-btn:active { background: #4ade80; color: #000; }
    #modeDisplay {
      font-size: 18px;
      color: #fff;
      min-width: 80px;
      text-align: center;
    }
    .controls {
      position: absolute;
      bottom: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div class="nav" id="nav"></div>
  <div class="nav-arrows">
    <button onclick="prevMode()" class="arrow-btn">◀ Prev</button>
    <span id="modeDisplay">1 / 10</span>
    <button onclick="nextMode()" class="arrow-btn">Next ▶</button>
  </div>
  <div class="controls" id="controls">Press keys or use arrows</div>
  <div id="canvasContainer"></div>

<script>
const modeNames = ["", "Fire Tree", "Snowflake", "Ocean Coral", "Neural Network", "Mushroom Cloud", "Lightning", "Desert Cactus", "Crystal Growth", "Sunflower", "Spider Web"];

let mode = 1;
let particles = [];
let pulses = [];
let lightningSeeds = [];
let coralTime = 0;
let currentName = "";

function setup() {
  let canvas = createCanvas(windowWidth, windowHeight);
  canvas.parent('canvasContainer');
  angleMode(RADIANS);
  strokeCap(ROUND);
  textFont('monospace');
  createNav();
  resetMode();
}

function createNav() {
  const nav = document.getElementById('nav');
  for (let i = 1; i <= 10; i++) {
    let btn = document.createElement('button');
    btn.textContent = i === 10 ? "0 " + modeNames[i] : i + " " + modeNames[i];
    btn.onclick = () => { mode = i; resetMode(); updateNav(); };
    btn.id = 'btn-' + i;
    nav.appendChild(btn);
  }
  updateNav();
}

function updateNav() {
  for (let i = 1; i <= 10; i++) {
    document.getElementById('btn-' + i).classList.toggle('active', i === mode);
  }
  document.getElementById('modeDisplay').textContent = mode + ' / ' + modeNames.length;
  document.getElementById('controls').textContent = modeNames[mode];
}

function nextMode() {
  mode = mode >= 10 ? 1 : mode + 1;
  resetMode();
  updateNav();
}

function prevMode() {
  mode = mode <= 1 ? 10 : mode - 1;
  resetMode();
  updateNav();
}

function keyPressed() {
  if (key >= '1' && key <= '9') {
    mode = int(key);
    resetMode();
    updateNav();
  } else if (key === '0') {
    mode = 10;
    resetMode();
    updateNav();
  }
}

function resetMode() {
  particles = [];
  pulses = [];
  lightningSeeds = [];
  coralTime = 0;
  currentName = modeNames[mode];

  if (mode === 6) {
    for (let i = 0; i < 4; i++) {
      lightningSeeds.push(random(1000));
    }
  }
}

function draw() {
  backgroundForMode();

  switch (mode) {
    case 1: drawFireTree(); break;
    case 2: drawSnowflake(); break;
    case 3: drawOceanCoral(); break;
    case 4: drawNeuralNetwork(); break;
    case 5: drawMushroomCloud(); break;
    case 6: drawLightning(); break;
    case 7: drawDesertCactus(); break;
    case 8: drawCrystalGrowth(); break;
    case 9: drawSunflower(); break;
    case 10: drawSpiderWeb(); break;
  }

  updateParticles();
  updatePulses();
}

function backgroundForMode() {
  switch (mode) {
    case 1: background(12, 8, 6); break;
    case 2: background(8, 18, 40); break;
    case 3: background(6, 30, 36); break;
    case 4: background(10, 8, 20); break;
    case 5: background(20, 10, 24); break;
    case 6: background(8, 12, 20); break;
    case 7: background(245, 220, 155); break;
    case 8: background(10, 10, 18); break;
    case 9: background(35, 60, 22); break;
    case 10: background(12, 14, 24); break;
  }
}

/* ========================= 1. FIRE TREE ========================= */
function drawFireTree() {
  push();
  translate(width / 2, height - 20);
  let a = PI / 5 + sin(millis() * 0.002) * 0.18;
  fireBranch(120, 12, 0, a);
  pop();
}

function fireBranch(len, thickness, depth, angle) {
  if (depth > 8 || len < 8) return;

  let flicker = map(noise(depth * 10, frameCount * 0.05), 0, 1, -25, 25);
  stroke(255, 100 + depth * 10 + flicker, 20 + depth * 5, 230);
  strokeWeight(thickness);
  line(0, 0, 0, -len);

  if (random() < 0.12) {
    let px = 0;
    let py = -len;
    particles.push({
      x: 0,
      y: -len,
      vx: random(-0.8, 0.8),
      vy: random(-2.2, -0.5),
      life: 60,
      type: "fire"
    });
  }

  translate(0, -len);

  push();
  rotate(angle + random(-0.08, 0.08));
  fireBranch(len * 0.72, thickness * 0.74, depth + 1, angle);
  pop();

  push();
  rotate(-angle + random(-0.08, 0.08));
  fireBranch(len * 0.72, thickness * 0.74, depth + 1, angle);
  pop();

  if (depth > 2 && random() < 0.35) {
    push();
    rotate(random(-0.4, 0.4));
    fireBranch(len * 0.5, thickness * 0.6, depth + 1, angle * 0.8);
    pop();
  }
}

/* ========================= 2. SNOWFLAKE ========================= */
function drawSnowflake() {
  push();
  translate(width / 2, height / 2);
  rotate(frameCount * 0.002);
  for (let i = 0; i < 6; i++) {
    push();
    rotate((TWO_PI / 6) * i);
    snowBranch(140, 4, 0);
    pop();
  }
  pop();
}

function snowBranch(len, weight, depth) {
  if (depth > 4 || len < 10) return;

  stroke(180, 220, 255, 240);
  strokeWeight(weight);
  line(0, 0, 0, -len);

  for (let t = 0.35; t < 0.9; t += 0.22) {
    let y = -len * t;
    push();
    translate(0, y);
    push();
    rotate(PI / 4);
    line(0, 0, 0, -len * 0.22);
    pop();
    push();
    rotate(-PI / 4);
    line(0, 0, 0, -len * 0.22);
    pop();
    pop();
  }

  translate(0, -len);
  push();
  rotate(PI / 6);
  snowBranch(len * 0.55, weight * 0.75, depth + 1);
  pop();
  push();
  rotate(-PI / 6);
  snowBranch(len * 0.55, weight * 0.75, depth + 1);
  pop();
}

/* ========================= 3. OCEAN CORAL ========================= */
function drawOceanCoral() {
  coralTime += 0.01;

  push();
  translate(width / 2, height - 40);
  for (let i = -2; i <= 2; i++) {
    push();
    translate(i * 80, 0);
    coralBranch(100 + i * 5, 10, 0, i * 20);
    pop();
  }
  pop();

  if (frameCount % 6 === 0) {
    particles.push({
      x: random(width * 0.25, width * 0.75),
      y: random(height * 0.45, height * 0.95),
      vx: random(-0.2, 0.2),
      vy: random(-1.2, -0.4),
      life: 100,
      type: "bubble"
    });
  }
}

function coralBranch(len, thickness, depth, seedOffset) {
  if (depth > 7 || len < 10) return;

  let sway = map(noise(seedOffset, depth * 0.3, coralTime), 0, 1, -0.35, 0.35);
  stroke(70, 220 - depth * 10, 220, 220);
  strokeWeight(thickness);
  line(0, 0, 0, -len);

  translate(0, -len);

  push();
  rotate(0.35 + sway);
  coralBranch(len * 0.75, thickness * 0.75, depth + 1, seedOffset + 10);
  pop();

  push();
  rotate(-0.35 + sway);
  coralBranch(len * 0.75, thickness * 0.75, depth + 1, seedOffset + 20);
  pop();

  if (random() < 0.2) {
    fill(120, 255, 240, 160);
    noStroke();
    ellipse(0, 0, 6 + depth, 6 + depth);
  }
}

/* ========================= 4. NEURAL NETWORK ========================= */
function drawNeuralNetwork() {
  push();
  translate(width / 2, height - 50);
  let a = PI / 5 + sin(millis() * 0.0016) * 0.12;
  neuralBranch(115, 8, 0, a, createVector(width / 2, height - 50));
  pop();

  if (frameCount % 25 === 0) {
    pulses.push({ progress: 0, speed: random(0.01, 0.02) });
  }
}

function neuralBranch(len, thickness, depth, angle, worldPos) {
  if (depth > 7 || len < 12) return;

  let x2 = worldPos.x;
  let y2 = worldPos.y - len;

  stroke(100, 120, 255, 180);
  strokeWeight(thickness);
  line(0, 0, 0, -len);

  fill(180, 220, 255);
  noStroke();
  ellipse(0, 0, 6 + thickness * 0.25);
  ellipse(0, -len, 6 + thickness * 0.22);

  if (random() < 0.12) {
    particles.push({
      x: x2, y: y2,
      vx: random(-0.3, 0.3), vy: random(-0.3, 0.3),
      life: 40, type: "glow"
    });
  }

  translate(0, -len);

  push();
  rotate(angle);
  neuralBranch(len * 0.72, thickness * 0.76, depth + 1, angle, createVector(x2, y2));
  pop();

  push();
  rotate(-angle);
  neuralBranch(len * 0.72, thickness * 0.76, depth + 1, angle, createVector(x2, y2));
  pop();
}

function updatePulses() {
  if (mode !== 4) return;

  push();
  translate(width / 2, height - 50);
  let a = PI / 5 + sin(millis() * 0.0016) * 0.12;
  for (let p of pulses) {
    drawPulseTree(115, 0, a, p.progress);
    p.progress += p.speed;
  }
  pulses = pulses.filter(p => p.progress <= 1.05);
  pop();
}

function drawPulseTree(len, depth, angle, progress) {
  if (depth > 7 || len < 12) return;

  let triggerMin = depth * 0.12;
  let triggerMax = triggerMin + 0.14;
  if (progress >= triggerMin && progress <= triggerMax) {
    noStroke();
    fill(255, 255, 255, 220);
    ellipse(0, -len * map(progress, triggerMin, triggerMax, 0, 1), 8, 8);
  }

  translate(0, -len);

  push();
  rotate(angle);
  drawPulseTree(len * 0.72, depth + 1, angle, progress);
  pop();

  push();
  rotate(-angle);
  drawPulseTree(len * 0.72, depth + 1, angle, progress);
  pop();
}

/* ========================= 5. MUSHROOM CLOUD ========================= */
function drawMushroomCloud() {
  push();
  translate(width / 2, height - 80);

  stroke(180, 100, 220, 220);
  strokeWeight(18);
  line(0, 0, 0, -160);

  noStroke();
  for (let y = -220; y <= -110; y += 20) {
    for (let x = -120; x <= 120; x += 20) {
      let d = dist(x, y, 0, -180);
      if (d < 110 + noise(x * 0.02, y * 0.02, frameCount * 0.01) * 30) {
        fill(180 + x * 0.2, 90 + d * 0.3, 220, 120);
        ellipse(x, y, 28 + noise(x, y) * 10);
      }
    }
  }

  for (let y = -130; y <= -50; y += 18) {
    let w = map(y, -130, -50, 60, 25);
    fill(165, 90, 205, 90);
    ellipse(0, y, w, 26);
  }

  pop();

  if (frameCount % 4 === 0) {
    particles.push({
      x: width / 2 + random(-100, 100),
      y: height - 320 + random(-30, 40),
      vx: random(-0.4, 0.4),
      vy: random(-1.4, -0.5),
      life: 100,
      type: "spore"
    });
  }
}

/* ========================= 6. LIGHTNING ========================= */
function drawLightning() {
  if (frameCount % 16 === 1) {
    background(180, 220, 255);
  }

  for (let i = 0; i < lightningSeeds.length; i++) {
    randomSeed(floor(lightningSeeds[i] + frameCount * 0.6));
    stroke(220, 255, 255, 220);
    strokeWeight(3);
    lightningBranch(width * (0.2 + i * 0.2), 0, PI / 2, 9, 16);
  }
}

function lightningBranch(x, y, angle, depth, len) {
  if (depth <= 0 || y > height) return;

  let nx = x + cos(angle + random(-0.55, 0.55)) * len;
  let ny = y + sin(angle + random(-0.35, 0.35)) * len * 1.8;

  line(x, y, nx, ny);

  if (random() < 0.18) {
    stroke(120, 240, 255, 90);
    strokeWeight(8);
    line(x, y, nx, ny);
    stroke(220, 255, 255, 220);
    strokeWeight(3);
  }

  lightningBranch(nx, ny, angle + random(-0.35, 0.35), depth - 1, len * 0.95);

  if (random() < 0.32) {
    lightningBranch(nx, ny, angle + random(-1.1, 1.1), depth - 2, len * 0.7);
  }
}

/* ========================= 7. DESERT CACTUS ========================= */
function drawDesertCactus() {
  push();
  translate(width / 2, height - 30);
  stroke(50, 120, 50);
  fill(60, 145, 65);
  cactusSegment(0, 0, 34, 220);

  drawArm(-70, -110, -1, 120, 24);
  drawArm(75, -140, 1, 100, 22);
  drawArm(-30, -190, -1, 70, 18);

  pop();
  drawGround();
}

function cactusSegment(x, y, w, h) {
  noStroke();
  fill(68, 150, 72);
  rectMode(CENTER);
  rect(x, y - h / 2, w, h, w / 2);
  stroke(230, 240, 200, 120);
  strokeWeight(1);
  for (let yy = y - h + 15; yy < y - 10; yy += 16) {
    line(x - 4, yy, x - 10, yy - 4);
    line(x + 4, yy + 4, x + 10, yy);
  }
}

function drawArm(x, y, dir, h, w) {
  push();
  translate(x, y);
  rotate(dir * 0.45);
  cactusSegment(0, 0, w, h);
  pop();
}

function drawGround() {
  noStroke();
  fill(210, 180, 110);
  rect(0, height - 45, width, 45);
}

/* ========================= 8. CRYSTAL GROWTH ========================= */
function drawCrystalGrowth() {
  push();
  translate(width / 2, height / 2 + 180);
  crystalBranch(0, 0, -120, 8, 0);
  pop();
}

function crystalBranch(x1, y1, len, depth, hueShift) {
  if (depth <= 0 || abs(len) < 10) return;

  let x2 = x1;
  let y2 = y1 + len;

  let c = color(
    120 + 120 * sin((frameCount * 0.02) + hueShift),
    120 + 120 * sin((frameCount * 0.02) + hueShift + 2),
    120 + 120 * sin((frameCount * 0.02) + hueShift + 4),
    210
  );

  stroke(c);
  strokeWeight(map(depth, 1, 8, 1, 5));
  fill(red(c), green(c), blue(c), 60);

  beginShape();
  vertex(x1 - 8, y1);
  vertex(x1 + 8, y1);
  vertex(x2 + 5, y2);
  vertex(x2 - 5, y2);
  endShape(CLOSE);

  push();
  translate(x2, y2);

  if (depth > 1) {
    let spread = PI / 6;
    rotate(spread);
    crystalBranch(0, 0, len * 0.75, depth - 1, hueShift + 0.8);
    rotate(-2 * spread);
    crystalBranch(0, 0, len * 0.75, depth - 1, hueShift + 1.5);
    rotate(spread);
    crystalBranch(0, 0, len * 0.85, depth - 1, hueShift + 0.2);
  }

  pop();
}

/* ========================= 9. SUNFLOWER ========================= */
function drawSunflower() {
  push();
  translate(width / 2, height / 2);

  let n = 420;
  let golden = PI * (3 - sqrt(5));
  noStroke();

  for (let i = 0; i < n; i++) {
    let r = 7 * sqrt(i);
    let a = i * golden + frameCount * 0.002;
    let x = cos(a) * r;
    let y = sin(a) * r;

    let t = map(i, 0, n, 0, 1);
    fill(100 + 155 * t, 70 + 110 * t, 10, 230);
    ellipse(x, y, 7, 7);
  }

  for (let i = 0; i < 36; i++) {
    let a = (TWO_PI / 36) * i + sin(frameCount * 0.02) * 0.02;
    let x = cos(a) * 160;
    let y = sin(a) * 160;
    push();
    translate(x, y);
    rotate(a + PI / 2);
    fill(255, 190, 20, 220);
    ellipse(0, 0, 38, 85);
    pop();
  }

  fill(90, 55, 20);
  ellipse(0, 0, 170, 170);
  pop();
}

/* ========================= 10. SPIDER WEB ========================= */
function drawSpiderWeb() {
  push();
  translate(width / 2, height / 2);

  stroke(220, 230, 255, 170);
  strokeWeight(1.4);

  let spokes = 16;
  let rings = 11;
  let maxR = 250 + sin(frameCount * 0.01) * 8;

  for (let i = 0; i < spokes; i++) {
    let a = (TWO_PI / spokes) * i;
    line(0, 0, cos(a) * maxR, sin(a) * maxR);
  }

  noFill();
  for (let r = 25; r <= maxR; r += maxR / rings) {
    beginShape();
    for (let i = 0; i <= spokes; i++) {
      let a = (TWO_PI / spokes) * i;
      let wobble = map(noise(i * 0.2, r * 0.01, frameCount * 0.01), 0, 1, -8, 8);
      vertex(cos(a) * (r + wobble), sin(a) * (r + wobble));
    }
    endShape();
  }

  for (let i = 0; i < 20; i++) {
    let a = i * 0.83;
    let r = 40 + i * 10;
    fill(180, 220, 255, 170);
    noStroke();
    ellipse(cos(a) * r, sin(a) * r, 4 + sin(frameCount * 0.03 + i) * 1.5);
  }

  pop();
}

/* ========================= PARTICLES ========================= */
function updateParticles() {
  for (let p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    if (p.type === "fire") {
      noStroke();
      fill(255, 160, 40, map(p.life, 0, 60, 0, 180));
      ellipse(p.x, p.y, 5, 5);
    } else if (p.type === "bubble") {
      noFill();
      stroke(180, 255, 255, map(p.life, 0, 100, 0, 160));
      strokeWeight(1.2);
      ellipse(p.x, p.y, 8, 8);
    } else if (p.type === "spore") {
      noStroke();
      fill(220, 140, 255, map(p.life, 0, 100, 0, 140));
      ellipse(p.x, p.y, 5, 5);
    } else if (p.type === "glow") {
      noStroke();
      fill(180, 220, 255, map(p.life, 0, 40, 0, 120));
      ellipse(p.x, p.y, 8, 8);
    }
  }

  particles = particles.filter(p => p.life > 0);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
